# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libsqlite3-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      # foretaccess embarque un noyau câble en Rust (extendr) : cargo/rustc
      # doivent être sur le PATH avant l'installation (local::. tire foretaccess
      # depuis les sources — Remotes: pobsteta/foretaccess@*release).
      - name: Setup Rust toolchain (foretaccess cable core via extendr)
        uses: dtolnay/rust-toolchain@stable

      # Workaround régression pak 0.11.0 : la résolution des remotes
      # owner/*@*release y échoue ("the condition has length > 1"). On épingle
      # pak 0.10.0 (source, archive CRAN) via R_LIB_FOR_PAK + pak-version: none.
      - name: Pin pak 0.10.0 (pak 0.11.0 regression on owner/*@*release)
        run: |
          echo "R_LIB_FOR_PAK=${RUNNER_TEMP}/pak-lib" >> "$GITHUB_ENV"
          Rscript -e 'lib <- file.path(Sys.getenv("RUNNER_TEMP"), "pak-lib"); dir.create(lib, recursive = TRUE, showWarnings = FALSE); install.packages("https://cran.r-project.org/src/contrib/Archive/pak/pak_0.10.0.tar.gz", repos = NULL, type = "source", lib = lib); cat("pinned pak:", as.character(packageVersion("pak", lib.loc = lib)), "\n")'
        shell: bash

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          pak-version: none
          extra-packages: any::pkgdown, local::., github::cran/dissUtils, jbferet/spinR
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
