# Nemeton Shiny CI/CD Pipeline
name: R-CMD-check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================
  # Job 0: cohérence des versions (DESCRIPTION = NEWS = CITATION)
  # Garde-fou : empêche le drift qui laissait p.ex. le badge à la traîne.
  # On ne compare PAS au tag git (créé après le merge), seulement les
  # fichiers du dépôt — la version de release doit être posée AVANT le push.
  # ============================================================
  version-consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: DESCRIPTION = NEWS.md = CITATION.cff
        run: |
          desc=$(awk '/^Version:/{print $2; exit}' DESCRIPTION)
          if ! [[ "$desc" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Cycle dev ($desc) — garde-fou de cohérence sauté."
            exit 0
          fi
          news=$(grep -m1 -oE '[0-9]+\.[0-9]+\.[0-9]+' NEWS.md)
          cff=$(grep -m1 -E '^version:' CITATION.cff | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "DESCRIPTION=$desc  NEWS=$news  CITATION=$cff"
          if [ -z "$desc" ] || [ "$desc" != "$news" ] || [ "$desc" != "$cff" ]; then
            echo "::error::Versions désalignées (DESCRIPTION=$desc, NEWS=$news, CITATION=$cff)"
            exit 1
          fi
          echo "✅ versions alignées : $desc"

  # ============================================================
  # Job 1: R CMD check (structure, documentation, imports)
  # ============================================================
  R-CMD-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libsqlite3-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::remotes
            github::cran/dissUtils
            jbferet/spinR
          needs: check

      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--no-vignettes", "--no-build-vignettes")'
          error-on: '"error"'
          upload-snapshots: true

  # ============================================================
  # Job 2: Tests (testthat)
  # ============================================================
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # Non-snap Chrome for the shinytest2 E2E smoke (mod_rag_admin) : the
      # chromium snap wedges on Page.navigate under AppDriver, a real
      # google-chrome boots the app reliably. If Chrome is missing / fails to
      # boot, the E2E test skips (tryCatch -> skip in the test) — never fails CI.
      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            libsqlite3-dev libssl-dev libcurl4-openssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::testthat
            any::remotes
            any::shinytest2
            github::cran/dissUtils
            jbferet/spinR
          needs: check

      - name: Run tests
        env:
          # chromote resolves the browser from CHROMOTE_CHROME first; point it
          # at the Chrome that setup-chrome just installed.
          CHROMOTE_CHROME: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          # test_local() runs the suite from source (tests/testthat). We do NOT
          # use test_package(): it looks for tests INSIDE the installed package,
          # which are absent without R CMD INSTALL --install-tests, so it
          # silently found "No installed testthat tests" and ran nothing. With
          # test_local the whole suite — including the shinytest2 E2E smoke —
          # actually runs. stop_on_failure = TRUE fails the job on any failure.
          testthat::test_local(reporter = "summary", stop_on_failure = TRUE)
        shell: Rscript {0}

  # ============================================================
  # Job 3: Code coverage (covr + codecov)
  # ============================================================
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [R-CMD-check]

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            libsqlite3-dev libssl-dev libcurl4-openssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::covr
            any::remotes
            github::cran/dissUtils
            jbferet/spinR
          needs: coverage

      - name: Compute coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
